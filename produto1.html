<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poduto -Notebook Dell Inspirion 15</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
header {
    background: #222;
    color: #fff;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
}

nav a {
    color: #ccc;
    margin-left: 15px;
    text-decoration: none;
}

nav a:hover {
    color: #fff;
}

/* BREADCRUMB */
.breadcrumb {
    background: #8a6ad8;
    color: #fff;
    padding: 10px 30px;
    font-size: 14px;
}

/* PRODUTO */
.container {
    display: flex;
    gap: 40px;
    padding: 40px;
    background: #fff;
}

.product-img {
    width: 350px;
}

.product-img img {
    width: 100%;
    border-radius: 10px;
}

.product-info h1 {
    margin: 0;
}

.price {
    font-size: 28px;
    color: #333;
    margin: 15px 0;
}

.quantity {
    display: flex;
    align-items: center;
    gap: 10px;
}

.quantity button {
    padding: 5px 10px;
}

.btn {
    display: block;
    margin-top: 20px;
    padding: 12px;
    border: none;
    background: #000;
    color: #fff;
    cursor: pointer;
    width: 250px;
}

.btn:hover {
    background: #444;
}

.info-icons {
    margin-top: 30px;
}

.info-icons div {
    margin-bottom: 10px;
}

/* PRODUTOS */
.products {
    display: flex;
    gap: 20px;
    padding: 30px;
}

.product-card {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    width: 200px;
    text-align: center;
}

.product-card img {
    width: 100%;
}

.price-small {
    color: green;
    font-weight: bold;
}
</style>

</head>
<body>

<header>
    <div><strong>SENAI TECH STORE</strong></div>
    <nav>
        <a href="#">Início</a>
        <a href="#">Produtos</a>
        <a href="#">Categorias</a>
        <a href="#">Sobre</a>
    </nav>
</header>

<div class="breadcrumb">
    Início / Produtos / Smartphone / Apple iPhone 17
</div>

<div class="container">
    
    <div class="product-img">
        <img src="https://encrypted-tbn2.gstatic.com/shopping?q=tbn:ANd9GcTHVBelDQO1XYTGSc-_JhL8yU4myIXLTV3JMUqQTmsBotTFAngn8T7DX4dfae7U8i6MN_zZ4Oj5abOMZyPojZRGPJEPjBXOe58RtSpZyt2SkNcJh0E8AurFSwvBNjhTTDH_nMGFeQ&usqp=CAc"
    <div class="product-info">
        <h1>Notebook Dell Inspirion 15</h1>
        <div class="price">R$ 5.499,00</div>

        <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
        </div>

        <button class="btn">🛒 Adicionar à Sacola</button>
        <button class="btn" style="background:#eee;color:#000;">❤ Lista de desejos</button>

        <div class="info-icons">
            <div>🚚 Frete grátis</div>
            <div>🔒 Pagamento seguro</div>
            <div>🎧 Suporte 24/7</div>
        </div>
    </div>

</div>



</body>
</html>
